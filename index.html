<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kampens Spiller</title>

<style>
body { 
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 20px;

  background: linear-gradient(
    to bottom,
    #ffffff 0%,
    #ffffff 75%,
    rgb(52, 115, 61) 100%
  );

  background-attachment: fixed;
  color: #244c2f;
}

h2 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 20px;
  font-weight: 700;
  color: rgb(52, 115, 61);
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  animation: fadeIn 0.4s ease;
  border-left: 6px solid rgb(52, 115, 61);
}

.btn {
  width: 100%;
  padding: 18px;
  margin: 12px 0;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: rgb(52, 115, 61);
  color: white;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(52, 115, 61, 0.3);
  transition: 0.2s ease;
}

.btn:hover {
  background: rgb(72, 145, 82);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(72, 145, 82, 0.4);
}

.locked {
  background: #bbb !important;
  color: #666 !important;
  box-shadow: none !important;
  cursor: not-allowed !important;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero {
  text-align: center;
  padding: 70px 20px 50px;
  animation: fadeIn 1.2s ease-out forwards;
}

.hero img {
  max-width: 180px;
  height: auto;
  margin-bottom: 20px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
}

.hero h1 {
  font-size: 44px;
  font-weight: 900;
  margin: 0;
  text-shadow: 0 3px 6px rgba(0,0,0,0.25);
}

.accent-line {
  width: 120px;
  height: 6px;
  background: rgb(72, 145, 82);
  margin: 20px auto 0;
  border-radius: 3px;
}

</style>
</head>

<body>

<header class="hero">
  <img src="img/tjaereborg-gf-logo.png" alt="Tjæreborg GF logo">
  <h1>Tjæreborg GF 125 år</h1>
  <div class="accent-line"></div>
</header>

<h2>Kampens Spiller</h2>

<div id="teams" class="card"></div>

<div id="players" class="card" style="display:none;">
  <h2>Vælg spiller</h2>

  <button class="btn" style="background:#ccc;color:#333;" onclick="goBack()">Tilbage</button>

  <div id="playerButtons"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://jwejfmfrzwhgvjyfdvjy.supabase.co",
  "sb_publishable_Mz0WlM2TToSWghb8TORA4w_EUZHT6Iz"
);

// DEVICE ID
let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = crypto.randomUUID();
  localStorage.setItem("device_id", deviceId);
}

// HENT HOLD DER ER STEMT PÅ
async function getVotedTeams() {
  const { data } = await supabase
    .from("user_votes")
    .select("team")
    .eq("device_id", deviceId);

  return data ? data.map(r => r.team) : [];
}

// HENT SPILLERE
async function getPlayers(team) {
  const { data, error } = await supabase
    .from("votes")
    .select("player, player_number")
    .eq("team", team)
    .neq("player", "placeholder")
    .order("player_number");

  if (error) return [];

  const unique = new Map();
  data.forEach(row => {
    if (!unique.has(row.player)) {
      unique.set(row.player, {
        name: row.player,
        number: row.player_number
      });
    }
  });

  return [...unique.values()];
}

// LOAD TEAMS
async function loadTeams() {
  const { data, error } = await supabase
    .from("votes")
    .select("team, match_time")
    .order("match_time");

  if (error) return;

  const votedTeams = await getVotedTeams();

  const groups = {};
  data.forEach(row => {
    if (!groups[row.match_time]) groups[row.match_time] = new Set();
    groups[row.match_time].add(row.team);
  });

  const container = document.getElementById("teams");
  container.innerHTML = "";

  const sortedTimes = Object.keys(groups).sort();

  sortedTimes.forEach(time => {
    const h = document.createElement("h3");
    h.textContent = `Kamp kl. ${time}`;
    h.style.textAlign = "center";
    h.style.color = "rgb(52,115,61)";
    container.appendChild(h);

    const sortedTeams = Array.from(groups[time]).sort((a, b) => {
      const aT = a.toLowerCase().includes("tjæreborg");
      const bT = b.toLowerCase().includes("tjæreborg");
      if (aT && !bT) return -1;
      if (!aT && bT) return 1;
      return a.localeCompare(b);
    });

    sortedTeams.forEach(team => {
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = team;

      if (votedTeams.includes(team)) {
        btn.classList.add("locked");
        btn.disabled = true;
      } else {
        btn.onclick = () => selectTeam(team);
      }

      container.appendChild(btn);
    });
  });
}

loadTeams();

// GÅ TILBAGE
window.goBack = function() {
  document.getElementById("players").style.display = "none";
  document.getElementById("teams").style.display = "block";
};

// VÆLG HOLD
window.selectTeam = async function(team) {
  selectedTeam = team;

  const { data } = await supabase
    .from("user_votes")
    .select("*")
    .eq("device_id", deviceId)
    .eq("team", team)
    .maybeSingle();

  if (data) {
    alert("Du har allerede stemt på dette hold.");
    return;
  }

  document.getElementById("teams").style.display = "none";
  document.getElementById("players").style.display = "block";

  const container = document.getElementById("playerButtons");
  container.innerHTML = "";

  const players = await getPlayers(team);

  players.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.textContent = `${p.number} – ${p.name}`;
    btn.onclick = () => vote(team, p.name);
    container.appendChild(btn);
  });
};

// STEM
async function vote(team, player) {
  await supabase.rpc("increment_vote", {
    team_name: team,
    player_name: player
  });

  await supabase.from("user_votes").insert({
    device_id: deviceId,
    team: team,
    player: player
  });

  alert("Tak for din stemme!");

  document.getElementById("players").style.display = "none";
  await loadTeams();
  document.getElementById("teams").style.display = "block";
}

</script>

</body>
</html>
