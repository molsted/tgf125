<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Live Stemmer</title>

<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(180deg, #e9f0ff, #f7f9ff);
    color: #222;
  }

  h2 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    font-weight: 700;
    color: #1a3d7c;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    max-width: 600px;
    margin: 20px auto;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    animation: fadeIn 0.4s ease;
  }

  input, select {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #c9d6ff;
    margin-top: 10px;
    background: #f8faff;
  }

  button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: #1a73e8;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(26,115,232,0.3);
    transition: 0.2s ease;
  }

  button:hover {
    background: #155fc0;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(26,115,232,0.4);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }

  th {
    background: #1a3d7c;
    color: white;
    padding: 14px;
    font-size: 18px;
  }

  td {
    padding: 12px;
    font-size: 17px;
    border-bottom: 1px solid #eee;
  }

  tr:nth-child(even) {
    background: #f5f8ff;
  }

  .time-divider {
    background: #dfe7ff;
    font-weight: bold;
    text-align: center;
    padding: 10px;
    font-size: 18px;
    border-top: 3px solid #1a3d7c;
    border-bottom: 3px solid #1a3d7c;
  }

  .team-divider {
    background: #eef3ff;
    text-align: center;
    padding: 6px;
    font-size: 16px;
    border-bottom: 2px solid #b8c6ff;
  }

  /* SPINNER */
  #spinner {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(3px);
    z-index:9999;
    align-items:center;
    justify-content:center;
  }

  .spinner-circle {
    width:60px;
    height:60px;
    border:6px solid #cde5d1;
    border-top-color:#34733d;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }

  @keyframes spin {
    from { transform:rotate(0deg); }
    to   { transform:rotate(360deg); }
  }
</style>
</head>

<body>

<!-- SPINNER -->
<div id="spinner">
  <div class="spinner-circle"></div>
</div>

<h2>Admin – Live Resultater</h2>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <input id="code" type="password" placeholder="Indtast admin kode">
  <button onclick="login()">Login</button>
</div>

<!-- RESULTATER -->
<div id="results" style="display:none;">
  <div class="card">
    <h2>Live Resultater</h2>
    <table id="resultTable">
      <tr><th>Hold</th><th>Nr.</th><th>Spiller</th><th>Stemmer</th></tr>
    </table>
    <button onclick="logout()" style="background:#c62828;">Log ud</button>
  </div>

  <div class="card">
    <h2>Tilføj Hold</h2>
    <input id="newTeam" placeholder="Holdnavn">
    <button onclick="addTeam()">Tilføj Hold</button>
  </div>

  <div class="card">
    <h2>Tilføj Spiller</h2>
    <select id="teamSelect"></select>
    <input id="newPlayer" placeholder="Spillernavn">
    <input id="newNumber" placeholder="Nummer">
    <button onclick="addPlayer()">Tilføj Spiller</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://jwejfmfrzwhgvjyfdvjy.supabase.co",
  "sb_publishable_Mz0WlM2TToSWghb8TORA4w_EUZHT6Iz"
);

let table = null;

// SPINNER
function showSpinner() {
  document.getElementById("spinner").style.display = "flex";
}
function hideSpinner() {
  document.getElementById("spinner").style.display = "none";
}

// AUTO LOGIN
window.addEventListener("DOMContentLoaded", async () => {
  if (localStorage.getItem("admin_logged_in") === "true") {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("results").style.display = "block";
    table = document.getElementById("resultTable");
    await loadData();
    await loadTeams();
    enableRealtime();
  }
});

// LOGIN
window.login = async function() {
  const input = document.getElementById("code").value;

  const { data } = await supabase
    .from("admin_settings")
    .select("admin_password")
    .maybeSingle();

  if (!data || input !== data.admin_password) {
    alert("Forkert kode");
    return;
  }

  localStorage.setItem("admin_logged_in", "true");

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("results").style.display = "block";

  table = document.getElementById("resultTable");

  await loadData();
  await loadTeams();
  enableRealtime();
};

// LOGOUT
window.logout = function() {
  localStorage.removeItem("admin_logged_in");
  location.reload();
};

// LOAD DATA
async function loadData() {
  showSpinner();

  const { data } = await supabase
    .from("votes")
    .select("team, player, player_number, votes, match_time")
    .neq("player", "placeholder");

  hideSpinner();

  if (!data) return renderTable([]);

  // SORTERING
  data.sort((a, b) => {
    if (a.match_time !== b.match_time)
      return String(a.match_time).localeCompare(String(b.match_time));

    const aT = a.team.toLowerCase().includes("tjæreborg");
    const bT = b.team.toLowerCase().includes("tjæreborg");
    if (aT && !bT) return -1;
    if (!aT && bT) return 1;

    if (a.team !== b.team)
      return a.team.localeCompare(b.team);

    if (a.votes !== b.votes)
      return b.votes - a.votes;

    const numA = a.player_number != null ? Number(a.player_number) : 9999;
    const numB = b.player_number != null ? Number(b.player_number) : 9999;
    if (numA !== numB) return numA - numB;

    return a.player.localeCompare(b.player);
  });

  renderTable(data);
}

// RENDER TABLE WITH DIVIDERS
function renderTable(data) {
  table.innerHTML = `
    <tr><th>Hold</th><th>Nr.</th><th>Spiller</th><th>Stemmer</th></tr>
  `;

  let lastTime = null;
  let lastTeam = null;

  data.forEach(row => {

    if (row.match_time !== lastTime) {
      const div = document.createElement("tr");
      div.innerHTML = `<td colspan="4" class="time-divider">Kamp kl. ${row.match_time}</td>`;
      table.appendChild(div);
      lastTime = row.match_time;
      lastTeam = null;
    }

    if (row.team !== lastTeam) {
      const div = document.createElement("tr");
      div.innerHTML = `<td colspan="4" class="team-divider">${row.team}</td>`;
      table.appendChild(div);
      lastTeam = row.team;
    }

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.team}</td>
      <td>${row.player_number ?? ""}</td>
      <td>${row.player}</td>
      <td>${row.votes}</td>
    `;
    table.appendChild(tr);
  });
}

// REALTIME
function enableRealtime() {
  supabase
    .channel("votes-changes")
    .on(
      "postgres_changes",
      { event: "UPDATE", schema: "public", table: "votes" },
      () => loadData()
    )
    .subscribe();
}

// LOAD TEAMS
async function loadTeams() {
  showSpinner();

  const { data } = await supabase
    .from("votes")
    .select("team, match_time, player")
    .neq("player", "placeholder");

  hideSpinner();

  const groups = {};
  data.forEach(row => {
    if (!groups[row.match_time]) groups[row.match_time] = new Set();
    groups[row.match_time].add(row.team);
  });

  const select = document.getElementById("teamSelect");
  select.innerHTML = "";

  Object.keys(groups).sort().forEach(time => {
    const group = document.createElement("optgroup");
    group.label = `Kamp kl. ${time}`;

    Array.from(groups[time]).sort((a, b) => {
      const aT = a.toLowerCase().includes("tjæreborg");
      const bT = b.toLowerCase().includes("tjæreborg");
      if (aT && !bT) return -1;
      if (!aT && bT) return 1;
      return a.localeCompare(b);
    }).forEach(team => {
      const option = document.createElement("option");
      option.value = team;
      option.textContent = team;
      group.appendChild(option);
    });

    select.appendChild(group);
  });
}

// ADD TEAM
window.addTeam = async function() {
  const team = document.getElementById("newTeam").value.trim();
  if (!team) return alert("Indtast et holdnavn");

  showSpinner();
  await supabase.from("votes").insert({
    team: team,
    player: "placeholder",
    votes: 0
  });
  hideSpinner();

  alert("Hold tilføjet");
  document.getElementById("newTeam").value = "";

  loadTeams();
  loadData();
};

// ADD PLAYER
window.addPlayer = async function() {
  const team = document.getElementById("teamSelect").value;
  const player = document.getElementById("newPlayer").value.trim();
  const number = document.getElementById("newNumber").value.trim();

  if (!player) return alert("Indtast spillernavn");
  if (!number) return alert("Indtast spillernummer");

  showSpinner();
  await supabase.from("votes").insert({
    team: team,
    player: player,
    player_number: number,
    votes: 0
  });
  hideSpinner();

  alert("Spiller tilføjet");
  document.getElementById("newPlayer").value = "";
  document.getElementById("newNumber").value = "";

  loadData();
};
</script>

</body>
</html>
