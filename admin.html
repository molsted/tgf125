<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Live Stemmer</title>

<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(180deg, #e9f0ff, #f7f9ff);
    color: #222;
  }

  h2 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    font-weight: 700;
    color: #1a3d7c;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    max-width: 600px;
    margin: 20px auto;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    animation: fadeIn 0.4s ease;
  }

  input, select {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #c9d6ff;
    margin-top: 10px;
    background: #f8faff;
  }

  button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: #1a73e8;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(26,115,232,0.3);
    transition: 0.2s ease;
  }

  button:hover {
    background: #155fc0;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(26,115,232,0.4);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }

  th {
    background: #1a3d7c;
    color: white;
    padding: 14px;
    font-size: 18px;
  }

  td {
    padding: 12px;
    font-size: 17px;
    border-bottom: 1px solid #eee;
  }

  tr:nth-child(even) {
    background: #f5f8ff;
  }

  .highlight {
    animation: pulse 0.6s ease;
  }

  @keyframes pulse {
    0% { background-color: #fff3b0; }
    100% { background-color: inherit; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<h2>Admin – Live Resultater</h2>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <input id="code" type="password" placeholder="Indtast admin kode">
  <button onclick="login()">Login</button>
</div>

<!-- RESULTATER -->
<div id="results" style="display:none;">
  <div class="card">
    <h2>Live Resultater</h2>
    <table id="resultTable">
      <tr><th>Hold</th><th>Spiller</th><th>Stemmer</th></tr>
    </table>
  </div>

  <!-- ADD TEAM -->
  <div class="card">
    <h2>Tilføj Hold</h2>
    <input id="newTeam" placeholder="Holdnavn (fx 'U13 piger')">
    <button onclick="addTeam()">Tilføj Hold</button>
  </div>

  <!-- ADD PLAYER -->
  <div class="card">
    <h2>Tilføj Spiller</h2>
    <select id="teamSelect"></select>
    <input id="newPlayer" placeholder="Spillernavn">
    <button onclick="addPlayer()">Tilføj Spiller</button>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const ADMIN_CODE = "1234";

  const supabase = createClient(
    "https://jwejfmfrzwhgvjyfdvjy.supabase.co",
    "sb_publishable_Mz0WlM2TToSWghb8TORA4w_EUZHT6Iz"
  );

  let table = null;

  window.login = async function() {
  const input = document.getElementById("code").value;

  const { data, error } = await supabase
    .from("admin_settings")
    .select("admin_password")
    .limit(1)
    .maybeSingle();

  if (error || !data) {
    alert("Kunne ikke hente admin‑kode fra databasen.");
    return;
  }

  if (input !== data.admin_password) {
    alert("Forkert kode");
    return;
  }

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("results").style.display = "block";

  table = document.getElementById("resultTable");

  await loadData();
  await loadTeams();
  enableRealtime();
};


  async function loadData() {
    const { data } = await supabase
      .from("votes")
      .select("*")
      .order("team", { ascending: true });

    renderTable(data);
  }

  function renderTable(data) {
    table.innerHTML = `
      <tr><th>Hold</th><th>Spiller</th><th>Stemmer</th></tr>
    `;

    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.id = `row-${row.team}-${row.player}`;
      tr.innerHTML = `
        <td>${row.team}</td>
        <td>${row.player}</td>
        <td class="votes">${row.votes}</td>
      `;
      table.appendChild(tr);
    });
  }

  function enableRealtime() {
    supabase
      .channel("votes-changes")
      .on(
        "postgres_changes",
        { event: "UPDATE", schema: "public", table: "votes" },
        payload => {
          const row = payload.new;
          const tr = document.getElementById(`row-${row.team}-${row.player}`);

          if (tr) {
            const votesCell = tr.querySelector(".votes");
            votesCell.textContent = row.votes;

            tr.classList.add("highlight");
            setTimeout(() => tr.classList.remove("highlight"), 600);
          }
        }
      )
      .subscribe();
  }

  async function loadTeams() {
  const { data, error } = await supabase
    .from("votes")
    .select("team, match_time")
    .order("match_time");

  if (error) {
    console.error("Fejl ved hentning af hold:", error);
    return;
  }

  // Gruppér efter match_time
  const groups = {};
  data.forEach(row => {
    if (!groups[row.match_time]) groups[row.match_time] = new Set();
    groups[row.match_time].add(row.team);
  });

  const select = document.getElementById("teamSelect");
  select.innerHTML = "";

  // Sortér tider (HH.MM sorterer korrekt som tekst)
  const sortedTimes = Object.keys(groups).sort();

  sortedTimes.forEach(time => {
    // Opret optgroup for tidsgruppen
    const group = document.createElement("optgroup");
    group.label = `Kamp kl. ${time}`;

    // Sortér så Tjæreborg altid står først
    const sortedTeams = Array.from(groups[time]).sort((a, b) => {
      const aT = a.toLowerCase().includes("tjæreborg");
      const bT = b.toLowerCase().includes("tjæreborg");

      if (aT && !bT) return -1;
      if (!aT && bT) return 1;

      return a.localeCompare(b);
    });

    // Tilføj hold som options
    sortedTeams.forEach(team => {
      const option = document.createElement("option");
      option.value = team;
      option.textContent = team;
      group.appendChild(option);
    });

    select.appendChild(group);
  });
}


  window.addTeam = async function() {
    const team = document.getElementById("newTeam").value.trim();
    if (!team) return alert("Indtast et holdnavn");

    await supabase.from("votes").insert({
      team: team,
      player: "placeholder",
      votes: 0
    });

    alert("Hold tilføjet. Tilføj nu spillere.");
    document.getElementById("newTeam").value = "";

    loadTeams();
    loadData();
  };

  window.addPlayer = async function() {
    const team = document.getElementById("teamSelect").value;
    const player = document.getElementById("newPlayer").value.trim();

    if (!player) return alert("Indtast spillernavn");

    await supabase.from("votes").insert({
      team: team,
      player: player,
      votes: 0
    });

    alert("Spiller tilføjet");
    document.getElementById("newPlayer").value = "";

    loadData();
  };
</script>

</body>
</html>
